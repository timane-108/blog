<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBA Research Synopsis Generator — RTM Nagpur University</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f4f2ee;min-height:100vh;padding:24px 12px 48px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
.wrap{max-width:760px;margin:0 auto;background:white;border-radius:14px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,0.08)}
.hdr{background:#1F3864;color:white;padding:22px 32px 18px}
.hdr-t{font-family:'Crimson Pro',Georgia,serif;font-size:23px;font-weight:600;letter-spacing:.3px}
.hdr-s{font-size:12px;opacity:.7;margin-top:4px}
.prog{display:flex;padding:0 32px;margin:24px 0 28px}
.step{flex:1;padding:7px 4px;text-align:center;font-size:12px;border-bottom:2.5px solid #ddd;color:#aaa;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step.active{border-color:#E8760A;color:#E8760A;font-weight:500}
.step.done{border-color:#1F3864;color:#1F3864}
.sec{padding:0 32px 32px}
.lbl{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.9px;display:block;margin-bottom:14px}
.tag{display:inline-block;padding:3px 14px;border-radius:20px;font-size:12px;font-weight:500;background:#1F3864;color:white;margin-bottom:16px}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.spec-btn{padding:15px 16px;border:2px solid #e0e0e0;background:white;border-radius:8px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:14px;color:#333;transition:all .15s;width:100%}
.spec-btn:hover{border-color:#bbb}
.title-list{list-style:none;max-height:360px;overflow-y:auto;border:1px solid #e4e4e4;border-radius:8px;margin-bottom:18px}
.title-subhd{padding:8px 16px;font-size:11px;font-weight:600;color:#888;background:#f6f6f6;text-transform:uppercase;letter-spacing:.9px;border-bottom:1px solid #eee;position:sticky;top:0}
.title-item{padding:11px 16px;cursor:pointer;font-size:14px;line-height:1.5;border-bottom:1px solid #f2f2f2;background:white;border-left:3px solid transparent;color:#333;transition:all .1s}
.title-item:last-child{border-bottom:none}
.title-item:hover{background:#f9f9f9}
.title-item.sel{background:#1F386408;border-left-color:#1F3864}
.custom-wrap{margin-bottom:22px}
.chk-lbl{font-size:13px;color:#555;display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:10px}
.custom-in{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;margin-top:4px;outline:none;transition:border .15s}
.custom-in:focus{border-color:#1F3864}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.btn{padding:11px 26px;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-navy{background:#1F3864;color:white}
.btn-navy:hover{background:#16305a}
.btn-navy:disabled{background:#bbb;cursor:not-allowed}
.btn-saf{background:#E8760A;color:white}
.btn-saf:hover{background:#d06a09}
.btn-grey{background:#ededed;color:#555}
.btn-grey:hover{background:#e0e0e0}
.opt-card{border:2px solid #e0e0e0;border-radius:10px;padding:18px 22px;cursor:pointer;background:white;margin-bottom:12px;transition:all .15s}
.opt-card:hover{border-color:#ccc}
.opt-card.sel{border-color:#E8760A;background:#E8760A08}
.opt-lbl{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px}
.opt-lbl.sel{color:#E8760A}
.opt-title{font-size:15px;font-weight:500;color:#222;margin-bottom:8px;line-height:1.45}
.opt-rat{font-size:13px;color:#666;line-height:1.55;font-style:italic}
.orig-link{font-size:13px;color:#1F3864;background:none;border:none;cursor:pointer;padding:4px 0;text-decoration:underline;font-family:'DM Sans',sans-serif;display:block;margin-top:8px;text-align:left}
.syn-title{font-family:'Crimson Pro',Georgia,serif;font-size:20px;font-weight:600;color:#1F3864;margin-bottom:20px;line-height:1.4}
.syn-box{background:#fafaf8;border:1px solid #e8e4dc;border-radius:10px;padding:28px 32px;font-size:16px;line-height:1.9;color:#2a2a2a;font-family:'Crimson Pro',Georgia,serif}
.syn-box p{margin-bottom:20px}
.syn-box p:last-child{margin-bottom:0}
.err{background:#fff3f3;border:1px solid #ffcdd2;border-radius:6px;padding:10px 14px;font-size:13px;color:#c62828;margin-top:12px}
.disc{font-size:12px;color:#aaa;margin-top:20px;line-height:1.7;border-top:1px solid #f0f0f0;padding-top:18px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.ftr{text-align:center;font-size:12px;color:#bbb;padding:16px 32px;border-top:1px solid #f0f0f0;line-height:1.7}
@media(max-width:520px){
  .spec-grid{grid-template-columns:1fr}
  .hdr{padding:18px 20px 14px}
  .sec{padding:0 20px 24px}
  .prog{padding:0 20px}
  .syn-box{padding:20px 18px}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const WORKER_URL="https://mba-synopsis-proxy1.timane-rajesh.workers.dev/";

const SPEC_COLORS={"Marketing":"#C0392B","Finance":"#1A5F9E","HRM":"#2E7D32","Operations Management":"#6A1B9A","Entrepreneurship":"#B7770D"};

},

multi:["ESG Reporting Practices and Investor Perception Among Listed Firms in the Vidarbha Region","Applying the Balanced Scorecard Framework to Financial Performance Measurement in Nagpur's Cooperative Banks","Fintech Disruption and Its Impact on Retail Banking Strategy — A Study of Banks Operating in Nagpur","Climate Risk and Green Financing Opportunities for Agri-Sector MSMEs in Vidarbha — A PwC Framework Perspective","A Study of Value-Based Financial Management Practices Among Family-Owned Businesses in Nagpur"]
},
"HRM":{
core:["A Study of Employee Engagement and Retention Practices in IT and ITeS Firms at Nagpur SEZ","Impact of Training and Development Programmes on Employee Performance at WCL Nagpur","Work-Life Balance and Job Satisfaction Among Nursing Staff at Private Hospitals in Nagpur","A Study of Talent Acquisition Challenges Faced by MSMEs in Nagpur's Manufacturing Sector","Influence of Organisational Culture on Employee Motivation at MIHAN-Based Firms, Nagpur","Occupational Health and Safety Practices and Worker Productivity in Coal Mining Operations, Vidarbha","A Study of Performance Appraisal Systems and Their Perceived Fairness Among Employees in Nagpur's Banking Sector","Employee Attrition and Its Causes in BPO and ITeS Companies at Nagpur SEZ","Role of HR Practices in Managing Workforce Diversity at AIIMS Nagpur","Impact of Flexible Work Arrangements on Productivity Among Women Employees in Nagpur","A Study of Grievance Redressal Mechanisms and Employee Satisfaction in PSUs of Vidarbha","Skill Gap Analysis and Training Needs Among Workers in Vidarbha's Handloom and Textile Sector","Leadership Style and Its Effect on Team Performance in Nagpur-Based Logistics Firms","A Study of Compensation Structure and Its Influence on Employee Retention in Nagpur's Retail Sector","Mentoring Practices and Career Development Among Junior Faculty in Nagpur's Private Engineering Colleges","Impact of Digital HR Tools on Recruitment Efficiency in Mid-Sized Firms in Nagpur","A Study of Employee Stress and Burnout Among Ground Staff at Dr Babasaheb Ambedkar International Airport, Nagpur","Contract Labour Management and Industrial Relations in Agri-Processing Units in Vidarbha","A Study of CSR-Linked Employee Volunteering and Its Effect on Organisational Commitment in Nagpur Corporates","Gender Diversity Initiatives and Their Impact on Workplace Inclusion in Nagpur's Healthcare Sector"],
multi:["Applying McKinsey's 7S Framework to Diagnose Organisational Effectiveness in Nagpur-Based Manufacturing Firms","Organisational Health and People Practices — A Study Benchmarked Against McKinsey Organisational Health Index in IT Firms at Nagpur SEZ","Future of Work Trends and HR Strategy Realignment Among Mid-Sized Enterprises in Nagpur — A Deloitte Framework Analysis","A Study of Psychological Safety and Innovation Culture in Nagpur's Knowledge-Intensive Firms","Employer Branding as a Talent Retention Strategy — Benchmarking Practices of Top Employers Against Nagpur-Based Firms"]
},
"Operations Management":{
core:["Supply Chain Efficiency and Cold Storage Infrastructure for Orange and Soybean Produce in Vidarbha","A Study of Inventory Management Practices in Retail Outlets at Sitabuldi and Laxmi Nagar, Nagpur","Lean Manufacturing Practices and Waste Reduction in Agri-Processing Units in Vidarbha","A Study of Logistics Network Optimisation Among Road Freight Operators at Nagpur's Zero-Mile Hub","Operational Efficiency and Turnaround Time Management at Dr Babasaheb Ambedkar International Airport, Nagpur","Quality Management Practices and Their Impact on Patient Safety at Private Hospitals in Nagpur","A Study of Vendor Management and Procurement Practices in Construction Projects at MIHAN Nagpur","Capacity Utilisation and Operational Bottlenecks in Coal Handling Operations at WCL Nagpur","Adoption of Warehouse Management Systems Among Third-Party Logistics Providers in Nagpur","A Study of Production Planning and Scheduling Practices in Vidarbha's Handloom Clusters","Maintenance Management and Equipment Downtime Reduction at NTPC Koradi Power Station","Service Delivery Efficiency and Queue Management at AIIMS Nagpur's Outpatient Department","A Study of Reverse Logistics Practices Among E-Commerce Delivery Firms Operating in Nagpur","Total Quality Management Implementation and Its Outcomes in SMEs at Nagpur's Butibori Industrial Area","A Study of Last-Mile Delivery Challenges and Customer Satisfaction Among Online Grocery Platforms in Nagpur","Green Supply Chain Practices and Environmental Compliance Among Manufacturing Firms in Vidarbha","Impact of ERP System Adoption on Operational Performance in Mid-Sized Firms in Nagpur","A Study of Project Management Practices and Schedule Adherence in Infrastructure Projects at MIHAN","Demand Forecasting Accuracy and Its Effect on Stockout Rates Among FMCG Distributors in Nagpur","A Study of Outsourcing Decisions and Their Effect on Cost Efficiency in IT Firms at Nagpur SEZ"],
multi:["Industry 4.0 Readiness and Digital Transformation of Shop-Floor Operations in Butibori Industrial Area, Nagpur","Supply Chain Resilience Frameworks Post-COVID — A Bain and McKinsey Lens Applied to Vidarbha's Agri-Supply Chains","Applying the SCOR Model to Evaluate Logistics Performance Among Third-Party Providers at Nagpur's Zero-Mile Hub","Sustainability and Circular Economy Practices in Operations — A Study of Manufacturing Firms in Vidarbha","A Study of Operational Excellence Using the DMAIC Framework in Agri-Processing Units in Nagpur"]
},
"Entrepreneurship":{
core:["A Study of Startup Ecosystem Support and Challenges Faced by First-Generation Entrepreneurs at Nagpur SEZ","Motivational Factors and Barriers to Women Entrepreneurship in Urban and Peri-Urban Nagpur","Role of MUDRA Yojana in Financing Micro-Enterprises Among Youth Entrepreneurs in Vidarbha","A Study of Agri-Entrepreneurship Intentions Among Agriculture Graduates in Vidarbha","Challenges and Growth Strategies of Handloom and Textile Artisan Enterprises in Nagpur's Weaver Clusters","Impact of Incubation Support on Early-Stage Startup Survival in Nagpur","A Study of Digital Adoption and Business Performance Among Women-Led Home-Based Enterprises in Nagpur","Entrepreneurial Orientation and Business Growth Among MSMEs in Butibori Industrial Area, Nagpur","A Study of Social Entrepreneurship Initiatives Addressing Farmer Distress in Vidarbha","Access to Formal Credit and Its Impact on Growth of First-Generation Entrepreneurs in Nagpur","A Study of Family Business Succession Planning and Professionalisation Among Trading Firms at Itwari, Nagpur","Role of Self-Help Groups in Nurturing Rural Women Entrepreneurship in Vidarbha","Challenges of Scaling Agri-Processing Startups in the Post-Harvest Value Chain in Vidarbha","A Study of Entrepreneurial Failure, Learning, and Re-Entry Among SME Owners in Nagpur","Impact of Government Schemes Under Startup India on Entrepreneurship Activity in Nagpur District","A Study of Innovation Practices and Competitive Advantage Among Tech Startups at Nagpur SEZ","Gig Economy Participation and Entrepreneurial Behaviour Among Youth in Nagpur","A Study of Market Linkage Challenges Faced by Organic Farming Entrepreneurs in Vidarbha","Role of Mentorship and Peer Networks in Entrepreneurial Success Among MBA Graduates in Nagpur","A Study of E-Commerce as an Enabler of Micro-Enterprise Growth Among Artisans and Weavers in Vidarbha"],
multi:["Business Model Canvas Application and Pivot Strategies Among Early-Stage Startups in Nagpur's Incubation Ecosystem","Disruptive Innovation Potential in Vidarbha's Agri-Tech Sector — A Christensen Framework Analysis","Applying Blue Ocean Strategy to Social Enterprises Addressing Farmer Welfare in Vidarbha","Entrepreneurial Ecosystem Mapping for Nagpur — Benchmarking Against Isenberg's Ecosystem Framework","A Study of Platform Business Models and Their Viability for Artisan and Weaver Cooperatives in Nagpur"]
}
};

let state={stage:1,spec:"",selTitle:"",customTitle:"",useCustom:false,optA:{title:"",rat:""},optB:{title:"",rat:""},finalTitle:"",synopsis:"",loading:false,error:"",copied:false};

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs||{})){
    if(k==="class")el.className=v;
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else el.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null||c===false)continue;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return el;
}

async function callClaude(system,userMsg,maxTok=1000){
  const r=await fetch(WORKER_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:maxTok,
      system,
      messages:[{role:"user",content:userMsg}]
    })
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.find(b=>b.type==="text")?.text||"";
}

function parseRef(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(l=>l);
  let a={title:"",rat:""},b={title:"",rat:""};
  for(const l of lines){
    if(l.startsWith("OPTION A:"))a.title=l.replace("OPTION A:","").trim();
    else if(l.startsWith("RATIONALE A:"))a.rat=l.replace("RATIONALE A:","").trim();
    else if(l.startsWith("OPTION B:"))b.title=l.replace("OPTION B:","").trim();
    else if(l.startsWith("RATIONALE B:"))b.rat=l.replace("RATIONALE B:","").trim();
  }
  return{a,b};
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const{stage,spec,selTitle,customTitle,useCustom,optA,optB,finalTitle,synopsis,loading,error,copied}=state;
  const titleToUse=useCustom?customTitle:selTitle;
  const steps=["Specialisation","Select Title","Refine","Synopsis"];

  const hdrEl=h("div",{class:"hdr"},
    h("div",{class:"hdr-t"},"MBA Research Synopsis Generator"),
    h("div",{class:"hdr-s"},"MBA Semester IV · RTM Nagpur University · AI-Assisted Academic Tools")
  );

  const progEl=h("div",{class:"prog"});
  steps.forEach((s,i)=>{
    const cl="step"+(stage===i+1?" active":stage>i+1?" done":"");
    progEl.appendChild(h("div",{class:cl},(stage>i+1?"✓ ":"")+s));
  });

  app.appendChild(hdrEl);
  app.appendChild(progEl);

  const sec=h("div",{class:"sec"});
  app.appendChild(sec);

  if(stage===1){
    sec.appendChild(h("span",{class:"lbl"},"Step 1 — Choose your specialisation"));
    const grid=h("div",{class:"spec-grid"});
    Object.keys(TITLES).forEach(sp=>{
      const col=SPEC_COLORS[sp];
      const btn=h("button",{class:"spec-btn"+(state.spec===sp?" sel":""),onclick:()=>{state.spec=sp;render();}},sp);
      if(state.spec===sp){btn.style.borderColor=col;btn.style.background=col+"18";btn.style.color=col;btn.style.fontWeight="500";}
      grid.appendChild(btn);
    });
    sec.appendChild(grid);
    const nb=h("button",{class:"btn btn-navy",onclick:()=>{if(state.spec){state.stage=2;render();}}},  "Continue →");
    if(!state.spec)nb.disabled=true;
    sec.appendChild(nb);
  }

  if(stage===2){
    sec.appendChild(h("div",{class:"tag"},spec));
    sec.appendChild(h("span",{class:"lbl"},"Step 2 — Select a title or enter your own"));
    const ul=h("ul",{class:"title-list"});
    ul.appendChild(h("li",{class:"title-subhd"},"Core titles — 1 to 20"));
    TITLES[spec].core.forEach((t,i)=>{
      const li=h("li",{class:"title-item"+((!useCustom&&selTitle===t)?" sel":""),onclick:()=>{state.selTitle=t;state.useCustom=false;render();}},`${i+1}. ${t}`);
      ul.appendChild(li);
    });
    ul.appendChild(h("li",{class:"title-subhd"},"Multidisciplinary titles — 21 to 25"));
    TITLES[spec].multi.forEach((t,i)=>{
      const li=h("li",{class:"title-item"+((!useCustom&&selTitle===t)?" sel":""),onclick:()=>{state.selTitle=t;state.useCustom=false;render();}},`${i+21}. ${t}`);
      ul.appendChild(li);
    });
    sec.appendChild(ul);

    const cw=h("div",{class:"custom-wrap"});
    const chkLbl=h("label",{class:"chk-lbl"});
    const chk=h("input",{type:"checkbox",onchange:(e)=>{state.useCustom=e.target.checked;if(!e.target.checked)state.customTitle="";render();}});
    if(useCustom)chk.checked=true;
    chkLbl.appendChild(chk);
    chkLbl.appendChild(document.createTextNode(" I want to enter my own title instead"));
    cw.appendChild(chkLbl);
    if(useCustom){
      const inp=h("input",{class:"custom-in",type:"text",placeholder:"Type your research title here...",oninput:(e)=>{state.customTitle=e.target.value;}});
      inp.value=customTitle;
      setTimeout(()=>inp.focus(),50);
      cw.appendChild(inp);
    }
    sec.appendChild(cw);

    const canProceed=useCustom?customTitle.trim().length>5:selTitle.length>0;
    const btnRow=h("div",{class:"btn-row"});
    btnRow.appendChild(h("button",{class:"btn btn-grey",onclick:()=>{state.stage=1;render();}},"← Back"));
    const refBtn=h("button",{class:"btn btn-navy",onclick:async()=>{
      if(!canProceed||loading)return;
      state.loading=true;state.error="";render();
      try{
        const sys=`You are an academic research title specialist for MBA students at RTM Nagpur University. Given a research title and specialisation, provide exactly two refined alternatives. Respond in EXACTLY this format with no additional text:

OPTION A: [refined title — sharper, more focused, clearly names the key variable and target population]
RATIONALE A: [one sentence explaining why this version is more precise and researchable]

OPTION B: [refined title — broader scope, policy or societal angle, may reference a scheme or framework]
RATIONALE B: [one sentence explaining the wider relevance this version brings]`;
        const res=await callClaude(sys,`Specialisation: ${spec}\nOriginal title: ${titleToUse}\n\nProvide two refined alternatives.`,800);
        const p=parseRef(res);
        if(!p.a.title||!p.b.title)throw new Error("Could not parse response. Please try again.");
        state.optA=p.a;state.optB=p.b;state.stage=3;
      }catch(e){state.error=e.message||"Something went wrong. Please try again.";}
      state.loading=false;render();
    }});
    if(loading){refBtn.innerHTML='<span class="spin"></span>Refining title...';}
    else{refBtn.textContent="Refine This Title →";}
    if(!canProceed||loading)refBtn.disabled=true;
    btnRow.appendChild(refBtn);
    sec.appendChild(btnRow);
    if(error)sec.appendChild(h("div",{class:"err"},error));
  }

  if(stage===3){
    sec.appendChild(h("div",{class:"tag"},spec));
    sec.appendChild(h("span",{class:"lbl"},"Step 3 — Choose your refined title"));
    sec.appendChild(h("p",{style:{fontSize:"13px",color:"#888",marginBottom:"20px",lineHeight:"1.6",fontStyle:"italic"}},"Original: "+titleToUse));

    [{lbl:"Option A — Focused & Precise",opt:optA},{lbl:"Option B — Broader & Policy-Oriented",opt:optB}].forEach(({lbl,opt})=>{
      const isSel=finalTitle===opt.title&&finalTitle!=="";
      const card=h("div",{class:"opt-card"+(isSel?" sel":""),onclick:()=>{state.finalTitle=opt.title;render();}},
        h("div",{class:"opt-lbl"+(isSel?" sel":"")},lbl),
        h("div",{class:"opt-title"},opt.title),
        h("div",{class:"opt-rat"},opt.rat)
      );
      sec.appendChild(card);
    });

    const shortOrig=titleToUse.length>75?titleToUse.slice(0,75)+"...":titleToUse;
    sec.appendChild(h("button",{class:"orig-link",onclick:()=>{state.finalTitle=titleToUse;render();}},`Use original title instead: "${shortOrig}"`));

    const canGen=finalTitle.length>0;
    const btnRow=h("div",{class:"btn-row",style:{marginTop:"20px"}});
    btnRow.appendChild(h("button",{class:"btn btn-grey",onclick:()=>{state.stage=2;render();}},"← Back"));
    const genBtn=h("button",{class:"btn btn-navy",onclick:async()=>{
      if(!canGen||loading)return;
      state.loading=true;state.error="";render();
      try{
        const sys=`You are an expert academic research supervisor at RTM Nagpur University helping MBA Semester IV students write research project synopses. Write a complete, formal synopsis in continuous prose — no bullet points, no section headings, no numbered lists, no bold text. Use formal academic English throughout.

The synopsis must naturally flow through: an introduction and background to the topic, a clear statement of the problem, 3 to 4 specific objectives stated as complete sentences within the prose, the scope of the study, research methodology including research design, data collection approach and sampling, significance of the study, and limitations of the study.

End with a mandatory final paragraph connecting the study to Viksit Bharat 2047. This paragraph must name one specific pillar of Viksit Bharat 2047, mention one or two supporting Government of India schemes by their full name, and end with a sentence specifically about how Nagpur or the Vidarbha region contributes to or benefits from this national vision.

Write approximately 700 words total. Separate paragraphs with a blank line. Do not use any headings, bullets, numbers, bold text, or formatting marks of any kind.`;
        const res=await callClaude(sys,`Specialisation: ${state.spec}\nResearch Title: ${state.finalTitle}\n\nWrite the complete synopsis now.`,1800);
        state.synopsis=res;state.stage=4;
      }catch(e){state.error=e.message||"Something went wrong. Please try again.";}
      state.loading=false;render();
    }});
    if(loading){genBtn.innerHTML='<span class="spin"></span>Generating synopsis...';}
    else{genBtn.textContent="Generate Synopsis →";}
    if(!canGen||loading)genBtn.disabled=true;
    btnRow.appendChild(genBtn);
    sec.appendChild(btnRow);
    if(error)sec.appendChild(h("div",{class:"err"},error));
  }

  if(stage===4){
    sec.appendChild(h("div",{class:"tag"},spec));
    sec.appendChild(h("span",{class:"lbl"},"Step 4 — Your research synopsis"));
    sec.appendChild(h("div",{class:"syn-title"},finalTitle));
    const box=h("div",{class:"syn-box"});
    synopsis.split(/\n\n+/).forEach(para=>{
      if(para.trim())box.appendChild(h("p",{},para.trim()));
    });
    sec.appendChild(box);
    const btnRow=h("div",{class:"btn-row",style:{marginTop:"22px"}});
    const cpBtn=h("button",{class:"btn btn-saf",onclick:()=>{
      navigator.clipboard.writeText(`RESEARCH TITLE\n${finalTitle}\n\nSPECIALISATION: ${spec}\n\n${synopsis}`).then(()=>{
        state.copied=true;render();setTimeout(()=>{state.copied=false;render();},2500);
      });
    }},copied?"✓ Copied!":"Copy Synopsis to Clipboard");
    btnRow.appendChild(cpBtn);
    btnRow.appendChild(h("button",{class:"btn btn-grey",onclick:()=>{
      state={stage:1,spec:"",selTitle:"",customTitle:"",useCustom:false,optA:{title:"",rat:""},optB:{title:"",rat:""},finalTitle:"",synopsis:"",loading:false,error:"",copied:false};
      render();
    }},"↺ Start New Synopsis"));
    sec.appendChild(btnRow);
    sec.appendChild(h("p",{class:"disc"},"This synopsis is AI-generated and provided as a structured academic starting point. Review all content carefully with your faculty guide before submission. Verify all factual claims, adapt the methodology to your actual study design, and ensure the final submission reflects your own independent academic work. All intellectual responsibility for the submitted project rests with the student."));
  }

  app.appendChild(h("div",{class:"ftr"},
    "Prepared for MBA Students — RTM Nagpur University",h("br",{}),"AI-Assisted Academic Tools Initiative · 2024–25",h("br",{}),
    h("span",{style:{fontSize:"11px",color:"#ddd"}},"This tool augments academic learning. All final submissions remain the intellectual work and responsibility of the student.")
  ));
}

render();
</script>
</body>
</html>
